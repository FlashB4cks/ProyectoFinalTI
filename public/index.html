<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKParts ERP</title>
    <meta name="description" content="Sistema ERP para MKParts - Gestión de repuestos de motocicletas">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="erp-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <img src="img/logo.png" alt="MKParts Logo">
            </div>
            <ul class="nav-links">
                <li class="active" id="nav-dashboard" onclick="showModule('dashboard', event)">
                    <i class="fa-solid fa-chart-pie"></i> Dashboard
                </li>
                <li id="nav-ventas" onclick="showModule('ventas', event)">
                    <i class="fa-solid fa-receipt"></i> Ventas
                </li>
                <li id="nav-inventario" onclick="showModule('inventario', event)">
                    <i class="fa-solid fa-boxes-stacked"></i> Inventario
                </li>
                <li id="nav-compras" onclick="showModule('compras', event)">
                    <i class="fa-solid fa-truck-fast"></i> Compras
                </li>
                <li id="nav-crm" onclick="showModule('crm', event)">
                    <i class="fa-solid fa-users"></i> CRM
                </li>
                <li id="nav-contabilidad" onclick="showModule('contabilidad', event)">
                    <i class="fa-solid fa-file-invoice-dollar"></i> Contabilidad
                </li>
                <li id="nav-sistema" onclick="showModule('sistema', event)">
                    <i class="fa-solid fa-gear"></i> Administración
                </li>
            </ul>
            <div class="sidebar-footer">MKParts ERP v2.0 &bull; Docker DB</div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-bar">
                <div class="top-bar-left">
                    Sistema ERP &mdash; <span id="current-module-name">Dashboard</span>
                </div>
                <div class="user-info">
                    <i class="fa-solid fa-circle-user"></i>
                    <span>Admin</span>
                    <i class="fa-solid fa-chevron-down" style="font-size:0.7rem; color: var(--text-muted)"></i>
                </div>
            </header>

            <div id="module-content" class="content-wrapper">
                <!-- El contenido de los módulos se inyectará aquí vía JS -->
            </div>
        </main>
    </div>

    <!-- Modales para Formularios -->
    <div id="modal-container" class="modal-overlay" style="display: none;">
        <div class="modal-content" id="modal-box">
            <div class="modal-header">
                <h2 id="modal-title">Título</h2>
                <span class="close-modal" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></span>
            </div>
            <div id="modal-body" class="modal-body">
                <!-- Contenido del formulario inyectado dinámicamente -->
            </div>
        </div>
    </div>

    <!-- Toasts Container -->
    <div id="toast-container"></div>

    <script src="js/app.js"></script>
</body>
</html>
